name: Email sequence runner

# Runs the new subscriber autoresponder. This intentionally mirrors the
# scheduling-reminders workflow because Vercel Hobby Cron only supports daily
# execution, while this sequence runner should pick up immediate welcome emails.
#
# Requires the `CRON_SECRET` repo secret - same value set in Vercel env.

on:
  # Cron disabled - runner was failing every 15 minutes and flooding the
  # GitHub notifications inbox. Re-enable once the underlying failure
  # (likely CRON_SECRET mismatch or a 500 from the endpoint) is resolved,
  # or migrate this job to DigitalOcean.
  # schedule:
  #   - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: email-sequence-runner
  cancel-in-progress: false

# Security best practice: remove all permissions since we only make an external HTTP call
permissions: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call email sequence runner
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: ${{ vars.SITE_URL || 'https://www.digitalalchemy.dev' }}
        run: |
          set -euo pipefail

          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret is not set - aborting."
            exit 1
          fi

          # --retry 3 catches transient 5xx errors or network blips
          # --retry-all-errors ensures we retry on connection refused too
          response=$(curl -sS -w "\n%{http_code}" \
            "${SITE_URL}/api/email/sequence-runner" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            --max-time 60 \
            --retry 3 \
            --retry-delay 2 \
            --retry-all-errors)

          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1)

          echo "HTTP $status"
          echo "$body"

          if [ "$status" != "200" ]; then
            echo "::error::Email sequence runner returned $status"
            exit 1
          fi
