<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Outer glow border -->
  <rect x="1" y="1" width="30" height="30" rx="5" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.6"/>
  <!-- Flask silhouette behind letters -->
  <path d="M13 6 L13 12 L8 24 Q7 26 9 27 L23 27 Q25 26 24 24 L19 12 L19 6" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.15"/>
  <!-- D letter - bold geometric -->
  <path d="M6 9 L6 23 L11 23 Q15.5 23 15.5 16 Q15.5 9 11 9 Z M9 12 L10.5 12 Q12.5 12 12.5 16 Q12.5 20 10.5 20 L9 20 Z" fill="url(#glow)"/>
  <!-- A letter - bold geometric with circuit cut -->
  <path d="M17 23 L20.5 9 L22 9 L25.5 23 L23 23 L22.2 20 L20.3 20 L19.5 23 Z M20.8 17.5 L21.7 17.5 L21.25 13 Z" fill="#00D4FF"/>
  <!-- Circuit dots -->
  <circle cx="7" cy="7" r="1" fill="#00D4FF" opacity="0.4"/>
  <circle cx="25" cy="7" r="1" fill="#6366f1" opacity="0.4"/>
  <circle cx="16" cy="28" r="0.8" fill="#00D4FF" opacity="0.3"/>
  <!-- Circuit lines -->
  <line x1="7" y1="7" x2="10" y2="7" stroke="#00D4FF" stroke-width="0.5" opacity="0.3"/>
  <line x1="22" y1="7" x2="25" y2="7" stroke="#6366f1" stroke-width="0.5" opacity="0.3"/>
</svg>
